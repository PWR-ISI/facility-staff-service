services:
  app:
    build: .
    container_name: facility-staff-service
    command: gunicorn facility_staff.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_DB_HOST=db
      - DJANGO_DB_NAME=facility_staff_db
      - DJANGO_DB_USER=facility_staff_user
      - DJANGO_DB_PASSWORD=othersecretpassword
    ports:
      - "8004:8000"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: postgres-facility-staff-service
    restart: always
    environment:
      POSTGRES_DB: facility_staff_db
      POSTGRES_USER: facility_staff_user
      POSTGRES_PASSWORD: othersecretpassword
    volumes:
      - postgres-facility-staff-data:/var/lib/postgresql/data

volumes:
  postgres-facility-staff-data:
